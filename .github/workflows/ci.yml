name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Toolchain telemetry off; installs are reproducible and script-restricted.
env:
  TURBO_TELEMETRY_DISABLED: "1"
  DO_NOT_TRACK: "1"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -w run lint
      - run: pnpm typecheck

  test-linux:
    name: Unit + integration (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  # The journal watcher, live-file retry, bindings parser, and settings/secrets
  # code are Windows-behavior-sensitive — run those packages on Windows too.
  test-windows:
    name: Unit + integration (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @lodestar/core test
      - run: pnpm --filter @lodestar/data test
      - run: pnpm --filter @lodestar/shared test

  e2e-windows:
    name: Electron smoke (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # test:e2e ensures the Electron ABI, builds, then runs Playwright.
      - run: pnpm --filter desktop test:e2e

  compliance:
    name: Compliance (uncached)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm compliance
