<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- connect-src permits the LOOPBACK WS push server only (ephemeral port); all
         other network egress stays denied. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ws://127.0.0.1:*; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'"
    />
    <title>LODESTAR Overlay</title>
    <style>
      html,
      body,
      #overlay-root {
        margin: 0;
        height: 100%;
        background: transparent;
      }
    </style>
  </head>
  <body>
    <div id="overlay-root"></div>
    <script type="module" src="./overlay-main.tsx"></script>
  </body>
</html>
